<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Úkolníček</title>
    <style>
        /**
         * html:
         *  - světle šedé pozadí
         *
         * Obecně (body):
         *  - bezpatkové písmo
         *  - maximální šířka
         *  - zarovnání na střed (margin: 0 auto)
         *  - bílé pozadí
         *
         * Hlavička (header):
         *  - odsazení (padding)
         *  - podbarvení
         *
         * Nadpis (h1):
         *  - zvětšit velikost písma
         *
         * Obsah (main):
         *  - odsazení (padding)
         *
         * Patička (footer):
         *  - tmavé pozadí
         *  - bílé písmo
         *  - odsazení (padding)
         */
        html {
            background: #ddd;
        }
        body {
            max-width: 60em;
            margin: auto;
            font-family: sans-serif;
        }
        header {
            padding: 1em 2em;
            background: #C5CAE9;
            border-radius: 1em 1em 0 0;
        }
        main {
            padding: 1em;
            background: white;
        }
        h1 {
            font-size: 4em;
            color: #283593;
            margin-bottom: 0.25em;
        }
        .popis {
            font-size: 1.2em;
            font-style: italic;
        }
        footer {
            padding: 1em;
            background: #283593;
            color: white;
            border-radius: 0 0 1em 1em;
        }
        footer a {
            color: white;
        }

        .splneno{
            color:green;
        }

        .nesplneno{
            color:red;
        }

        .rozpracovano{
            color:blue;
        }


    </style>
</head>
<body>
    <header>
        <h1>Úkolníček</h1>
        <p class="popis">Stránka s našimi úkoly, úkoly mohou být splňené nebo ne. Úkoly jsou zařazené do kategorií.</p>
    </header>
    <main>
        <p>Obsah...</p>
    </main>
    <footer>
        <ul>
            <li>Autor: Pavel Petržela</li>
            <li>Vytvořeno dne: 4. 5. 2023</li>
            <li>V případě dotazů se obraťte na email <a href="mailto:pavel@petrzela.eu">pavel@petrzela.eu</a></li>
        </ul>
    </footer>
</body>
</html>
